<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>町の本屋さん</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 249, 230, 0.5), transparent 42%),
          radial-gradient(circle at 80% 75%, rgba(130, 91, 55, 0.12), transparent 45%),
          #efe3cd;
        color: #3b2b1d;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }

      .card {
        width: min(520px, 90vw);
        padding: 42px 30px;
        text-align: center;
        background:
          linear-gradient(rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.45)),
          repeating-linear-gradient(
            0deg,
            rgba(112, 86, 57, 0.04),
            rgba(112, 86, 57, 0.04) 2px,
            transparent 2px,
            transparent 5px
          ),
          #fff7e8;
        border: 3px double #8f6f4f;
        border-radius: 10px;
        box-shadow:
          0 14px 24px rgba(59, 43, 29, 0.14),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4);
      }

      h1 {
        margin: 0 0 22px;
        font-size: clamp(1.7rem, 4vw, 2.3rem);
        letter-spacing: 0.14em;
        text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
      }

      p {
        margin: 11px 0;
        font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      }

      .phone {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid #b89a79;
        font-size: clamp(1rem, 2.2vw, 1.2rem);
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>町の本屋さん</h1>
      <p>営業時間：9:00 - 20:00</p>
      <p>年中無休</p>
      <p class="phone">電話番号：0120-1234-5678</p>
    </main>
  </body>
</html>
