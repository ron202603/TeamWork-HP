<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>町の本屋さん</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f4eb;
        color: #2f241b;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }

      .card {
        width: min(520px, 90vw);
        padding: 40px 28px;
        text-align: center;
        background: #fffdf8;
        border: 1px solid #d8cdbf;
        border-radius: 12px;
        box-shadow: 0 12px 24px rgba(47, 36, 27, 0.08);
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(1.7rem, 4vw, 2.3rem);
        letter-spacing: 0.08em;
      }

      p {
        margin: 10px 0;
        font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>町の本屋さん</h1>
      <p>営業時間：9:00 - 20:00</p>
      <p>年中無休</p>
    </main>
  </body>
</html>
